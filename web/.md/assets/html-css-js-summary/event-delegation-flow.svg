<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Event delegation flow</title>
  <desc id="desc">An event travels through capturing, target, and bubbling phases, allowing a parent listener to handle child interactions.</desc>
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .dom { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; }
      .target { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 12; }
      .listener { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .text { font-family: Arial, sans-serif; font-size: 17px; fill: #0f172a; font-weight: 700; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
      .blue { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrowBlue); }
      .orange { stroke: #ea580c; stroke-width: 2.5; fill: none; marker-end: url(#arrowOrange); }
    </style>
  </defs>
  <rect class="bg" width="980" height="520" />
  <rect class="dom" x="90" y="70" width="180" height="70" />
  <text class="text" x="180" y="112" text-anchor="middle">window</text>
  <rect class="dom" x="90" y="160" width="180" height="70" />
  <text class="text" x="180" y="202" text-anchor="middle">document</text>
  <rect class="dom" x="90" y="250" width="180" height="70" />
  <text class="text" x="180" y="292" text-anchor="middle">ul</text>
  <rect class="listener" x="380" y="250" width="220" height="70" />
  <text class="text" x="490" y="280" text-anchor="middle">one parent listener</text>
  <text class="small" x="490" y="303" text-anchor="middle">event.currentTarget</text>
  <rect class="dom" x="90" y="340" width="180" height="70" />
  <text class="text" x="180" y="382" text-anchor="middle">li</text>
  <rect class="target" x="90" y="430" width="180" height="60" />
  <text class="text" x="180" y="466" text-anchor="middle">a target</text>
  <rect class="target" x="705" y="205" width="190" height="90" />
  <text class="text" x="800" y="239" text-anchor="middle">event.target</text>
  <text class="small" x="800" y="263" text-anchor="middle">actual clicked node</text>
  <rect class="listener" x="705" y="340" width="190" height="90" />
  <text class="text" x="800" y="374" text-anchor="middle">delegation</text>
  <text class="small" x="800" y="398" text-anchor="middle">filter target and act</text>
  <path class="blue" d="M 180 140 L 180 160" />
  <path class="blue" d="M 180 230 L 180 250" />
  <path class="blue" d="M 180 320 L 180 340" />
  <path class="blue" d="M 180 410 L 180 430" />
  <path class="orange" d="M 220 430 L 220 410" />
  <path class="orange" d="M 220 340 L 220 320" />
  <path class="orange" d="M 220 250 L 380 285" />
  <path class="orange" d="M 600 285 C 665 285 670 250 705 250" />
  <path class="blue" d="M 600 320 C 675 320 690 385 705 385" />
  <text class="small" x="335" y="85">capturing: outside to inside</text>
  <text class="small" x="335" y="455">bubbling: inside to outside</text>
  <text class="small" x="490" y="475" text-anchor="middle">Use propagation to reduce listener count when many children share the same interaction.</text>
</svg>
