<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript execution flow</title>
  <desc id="desc">Evaluation prepares execution context and lexical environment, then execution assigns values and calls functions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .main { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 10; }
      .fn { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, sans-serif; font-size: 17px; fill: #0f172a; font-weight: 700; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
      .line { stroke: #1d4ed8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .green { stroke: #047857; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="980" height="520" />
  <rect class="box" x="55" y="80" width="160" height="82" />
  <text class="text" x="135" y="112" text-anchor="middle">Source Code</text>
  <text class="small" x="135" y="136" text-anchor="middle">program text</text>
  <rect class="main" x="285" y="80" width="180" height="82" />
  <text class="text" x="375" y="112" text-anchor="middle">Evaluation</text>
  <text class="small" x="375" y="136" text-anchor="middle">prepare bindings</text>
  <rect class="main" x="535" y="80" width="180" height="82" />
  <text class="text" x="625" y="112" text-anchor="middle">Execution</text>
  <text class="small" x="625" y="136" text-anchor="middle">assign and call</text>
  <rect class="box" x="765" y="80" width="160" height="82" />
  <text class="text" x="845" y="112" text-anchor="middle">Result</text>
  <text class="small" x="845" y="136" text-anchor="middle">value or side effect</text>
  <rect class="main" x="285" y="250" width="180" height="95" />
  <text class="text" x="375" y="282" text-anchor="middle">Lexical Env</text>
  <text class="small" x="375" y="307" text-anchor="middle">name to value map</text>
  <text class="small" x="375" y="328" text-anchor="middle">outer reference</text>
  <rect class="fn" x="535" y="250" width="180" height="95" />
  <text class="text" x="625" y="282" text-anchor="middle">Function Value</text>
  <text class="small" x="625" y="307" text-anchor="middle">pass, return, call later</text>
  <text class="small" x="625" y="328" text-anchor="middle">callback / IIFE</text>
  <rect class="fn" x="380" y="405" width="220" height="70" />
  <text class="text" x="490" y="434" text-anchor="middle">Event Timing</text>
  <text class="small" x="490" y="456" text-anchor="middle">register now, execute later</text>
  <path class="line" d="M 215 121 L 285 121" />
  <path class="line" d="M 465 121 L 535 121" />
  <path class="line" d="M 715 121 L 765 121" />
  <path class="line" d="M 375 162 L 375 250" />
  <path class="green" d="M 625 162 L 625 250" />
  <path class="green" d="M 625 345 C 625 400 600 405 560 405" />
  <path class="line" d="M 535 440 L 445 440" />
  <text class="small" x="490" y="35" text-anchor="middle">Read JavaScript by when a value is created and when a function is executed.</text>
</svg>
