<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">Layout decision map</title>
  <desc id="desc">A decision map for choosing normal flow, flex, grid, position, and media query.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .choice { fill: #ecfdf5; stroke: #0f766e; stroke-width: 2; rx: 10; }
      .risk { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, sans-serif; font-size: 17px; fill: #0f172a; font-weight: 700; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
      .line { stroke: #0f766e; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="980" height="540" />
  <rect class="node" x="380" y="35" width="220" height="70" />
  <text class="text" x="490" y="65" text-anchor="middle">Start from structure</text>
  <text class="small" x="490" y="88" text-anchor="middle">content order and relationship</text>
  <rect class="choice" x="80" y="165" width="190" height="82" />
  <text class="text" x="175" y="196" text-anchor="middle">Normal Flow</text>
  <text class="small" x="175" y="220" text-anchor="middle">default document flow</text>
  <rect class="choice" x="305" y="165" width="190" height="82" />
  <text class="text" x="400" y="196" text-anchor="middle">Flex</text>
  <text class="small" x="400" y="220" text-anchor="middle">one-dimensional alignment</text>
  <rect class="choice" x="530" y="165" width="190" height="82" />
  <text class="text" x="625" y="196" text-anchor="middle">Grid</text>
  <text class="small" x="625" y="220" text-anchor="middle">rows and columns</text>
  <rect class="choice" x="755" y="165" width="150" height="82" />
  <text class="text" x="830" y="196" text-anchor="middle">Position</text>
  <text class="small" x="830" y="220" text-anchor="middle">layer or escape flow</text>
  <rect class="node" x="190" y="330" width="220" height="82" />
  <text class="text" x="300" y="362" text-anchor="middle">Component layout</text>
  <text class="small" x="300" y="386" text-anchor="middle">gap, padding, margin</text>
  <rect class="node" x="470" y="330" width="220" height="82" />
  <text class="text" x="580" y="362" text-anchor="middle">Responsive change</text>
  <text class="small" x="580" y="386" text-anchor="middle">breakpoint changes structure</text>
  <rect class="risk" x="750" y="330" width="170" height="82" />
  <text class="text" x="835" y="362" text-anchor="middle">z-index risk</text>
  <text class="small" x="835" y="386" text-anchor="middle">stacking and overlap</text>
  <path class="line" d="M 490 105 L 175 165" />
  <path class="line" d="M 490 105 L 400 165" />
  <path class="line" d="M 490 105 L 625 165" />
  <path class="line" d="M 490 105 L 830 165" />
  <path class="line" d="M 400 247 L 300 330" />
  <path class="line" d="M 625 247 L 580 330" />
  <path class="line" d="M 830 247 L 835 330" />
  <path class="line" d="M 580 412 L 580 470 L 300 470 L 300 412" />
  <text class="small" x="490" y="500" text-anchor="middle">Choose layout mode by relationship, not by memorized property names.</text>
</svg>
