<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* reset */
      html {
        font-size: 18px;
        line-height: 1.4;
      }
      body {
        margin: 0px;
        padding: 10px;
      }
      /* prettier-ignore */
      h1, h2, h3, h4, h5, h6 {
        font-size:1rem;
      }
      /* prettier-ignore */
      h1, h2, h3, h4, h5, h6, div, p, dl, dt, dd, ul, ol, li, form, fieldset, blockquote, address, table, thead, tbody, tfoot, tr, td, caption {
        margin:0;
        padding:0;
      }
      li {
        list-style: none;
      }

      .chart_box {
        box-sizing: border-box;
        width: 500px;
        padding: 20px;
        border: 2px solid black;
        background-color: #cdd0fb;
      }

      .chart_box > .bar {
        box-sizing: border-box;
        height: 35px;
        margin-top: 15px;
        padding-right: 10px;
        padding-top: 8px;
        text-align: right;
      }
      .chart_box > .bar:first-child {
        margin-top: 0px;
      }
      .chart_box > .bar > strong {
        color: white;
        margin-right: 0.25rem;
      }
      .chart_box > .bar.rank1 {
        width: 100%;
        background-color: firebrick;
      }
      .chart_box > .bar.rank2 {
        width: 75%;
        background-color: lightgreen;
      }
      .chart_box > .bar.rank4 {
        width: 54%;
        background-color: maroon;
      }
      .chart_box > .bar.rank3 {
        width: 64%;
        background-color: chocolate;
      }
    </style>
  </head>
  <body>
    <div class="chart_box">
      <div class="bar rank1"><strong>1위</strong><span>100%</span></div>
      <div class="bar rank2"><strong>2위</strong><span>75%</span></div>
      <div class="bar rank4"><strong>4위</strong><span>54%</span></div>
      <div class="bar rank3"><strong>3위</strong><span>64%</span></div>
    </div>
  </body>
</html>
