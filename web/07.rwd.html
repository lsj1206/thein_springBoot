<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: lightyellow;
        color: black;
      }
      h1 {
        font-size: 32px;
      }
      p {
        font-size: 24px;
      }
      .list {
        border: 4px solid lightblue;
        padding: 20px;
        margin: 0;
        display: grid;
        grid-template-columns: 1fr;
        grid-auto-rows: 100px;
      }
      .list > li {
        list-style: none;
        background-color: green;
        /* height: 100px; */
      }
      /* 720~ */
      @media (min-width: 720px) {
        body {
          background-color: lightcoral;
        }
        h1 {
          font-size: 28px;
        }
        p {
          font-size: 22px;
        }
        .list {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      /* 780~ */
      @media (min-width: 780px) {
        body {
          background-color: lightgreen;
          color: grey;
        }
        h1 {
          font-size: 24px;
        }
        p {
          font-size: 18px;
        }
      }
      /* 990~ */
      @media (min-width: 990px) {
        body {
          background-color: lightsalmon;
          color: green;
        }
        p {
          font-size: 16px;
        }
        .list {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <h1>반응형 웹 디자인</h1>
    <p>화면의 크기에 따라 레이아웃이 바뀌는 웹 디자인</p>
    <ul class="list">
      <li>제품 1</li>
      <li>제품 2</li>
      <li>제품 3</li>
      <li>제품 4</li>
      <li>제품 5</li>
      <li>제품 6</li>
      <li>제품 7</li>
      <li>제품 8</li>
    </ul>
  </body>
  <script>
    window.alert("반응형 웹 디자인");
  </script>
</html>
