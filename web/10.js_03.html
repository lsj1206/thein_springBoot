    <style>
      .active {
        border: 4px solid blue;
        border-radius: 10px;
        background-color: lightblue;
      }

        color: red;
      }

  <body>
    <div id="service">
      <h2 class="title">차량 서비스</h2>
      <ul title="리스트">
        <li><a href="http://eulsoo.com">을수</a></li>
        <li><a href="http://naver.com">네이버</a></li>
        <li><a href="http://daum.com">다음</a></li>
        <li><a href="http://kakao.com">카카오</a></li>
        <li><a href="http://google.com">구글</a></li>
      </ul>
    </div>
    <button class="btn change">확인</button>
    <button class="btn add">추가</button>
    <button class="btn modify">수정</button>
    <a href="" class="test">이벤트</a>
  </body>
  <script>
    // 재료 준비
    const result = document.querySelectorAll("#service > ul > li");
    const aEls = document.querySelectorAll("#service > ul > li > a");
    const ulEl = document.querySelector("#service > ul");
    const h2El = document.querySelector("#service > h2");
    const changeBtn = document.querySelector(".change");
    const addBtn = document.querySelector(".add");
    const modifyBtn = document.querySelector(".modify");
    const testAEl = document.querySelector(".test");
    const blankArr = [];

    // 감지 장치
    changeBtn.addEventListener("click", changeService);
    addBtn.addEventListener("click", addService);
    modifyBtn.addEventListener("click", modifyTitle);
    testAEl.addEventListener("click", testFn);

    function testFn(e) {
      e.preventDefault();
      console.log(e.target);
      e.target.style.backgroundColor = "lightcoral";
      ulEl.style.backgroundColor = "lightgreen";
    }

      //modern
      if (h2El.classList.contains("active")) {
        h2El.classList.remove("active");
      } else {
        h2El.classList.add("active");
      }
    }
    function addService() {
      // 1. insertAdjacentHTML 방식

      // liEl.appendChild(aEl);
      // ulEl.appendChild(liEl);
    }
    function changeService() {
      const titleValue = ulEl.getAttribute("title");
      h2El.setAttribute("title", "이건 내용입니다.");
      console.log(titleValue);

      for (let i = 0; i < result.length; i++) {
        blankArr.push(aEls[i].getAttribute("href"));
        result[i].className = "active";
        result[i].textContent += " (서비스)";
      }
    }
