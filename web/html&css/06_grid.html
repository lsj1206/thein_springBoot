<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .mother {
        border: 4px solid black;
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;
        row-gap: 10px;
        column-gap: 20px;
        /* gap: 20px; */
        /* height: 300px; */
      }
      .mother > .son {
        background-color: yellow;
        height: 100px;
      }
      .layout {
        display: grid;
        border: 4px solid blue;
        padding: 20px;
        height: 600px; /* repeat(4, 1fr) */
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-template-rows: 80px 400px 1fr;
      }
      .layout header {
        background-color: yellow;
        grid-column: 1 / 5;
        /* grid-column-end: 5; */
        grid-row: 1 / 2;
        /* grid-row-end: 2; */
      }

      main {
        background-color: orange;
        grid-column: 1 / 4;
        grid-row: 2 / 3;
      }
      aside {
        background-color: lime;
        grid-column: 4 / 5;
        grid-row: 2 / 3;
      }
      footer {
        background-color: gray;
        grid-column: 1 / 5;
        grid-row: 3 / 4;
      }
      .normal_flow {
        border: 4px solid red;
        padding: 20px;
        position: relative; /*ps position의 기준*/
      }
      .normal_flow > .son {
        background-color: lime;
      }
      .normal_flow > .son.ps {
        background-color: black;
        opacity: 0.8;
        position: fixed;
        top: 50%;
        left: 50%;
        right: 0;
        bottom: 0;
        height: 150px;
        width: 30%;
        transform: translate(-50%, -50%);
      }
      .menu {
        z-index: 999;
        background-color: black;
        color: white;
        position: fixed;
        top: 0;
        right: 0;
        width: 50px;
      }
      .box {
        border: 1px solid black;
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 20px;
      }
      .card {
        border: 1px solid green;
        padding: 20px;
        display: flex;
        gap: 20px;
        grid-row: 1 / 4;
        position: relative;
        height: 150px;
      }
      .imgbox {
        border: 8px solid green;
        padding: 20px;
        aspect-ratio: 1 / 1;
      }
      .textbox {
        overflow: hidden;
      }
      .msgbox {
        width: 36px;
        height: 36px;
        position: absolute;
        right: 0;
        top: 0;
        transform: translate(50%, -50%);
      }
      .msgbox img {
        width: 100%;
        height: 100%;
      }
      .msgbox p {
        margin: 0;
        padding: 0;
        position: absolute;
        top: 0;
        right: 110%;
        font-size: 16px;
        line-height: 1;
      }

      .box_footer {
        border: 1px solid black;
        padding: 12px;
        grid-column: 1 / 3;
        font-size: 18px;
        grid-row: 4 / 5;
      }
    </style>
  </head>
  <body>
    <!-- <header class="menu">header</header> -->

    <div class="box">
      <div class="card">
        <div class="imgbox"></div>
        <div class="textbox">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Orci adipiscing feugiat orci nisi, sapien ullamcorper
          molestie.
        </div>
        <div class="msgbox">
          <img src="./images/message.png" />
          <p>7</p>
        </div>
      </div>
      <div class="card">
        <div class="imgbox"></div>
        <div class="textbox">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Orci adipiscing feugiat orci nisi, sapien ullamcorper
          molestie.
        </div>
        <div class="msgbox">
          <img src="./images/message.png" />
          <p>365</p>
        </div>
      </div>
      <div class="box_footer">BOTTOM. 저는 세번째 자식입니다.</div>
    </div>
